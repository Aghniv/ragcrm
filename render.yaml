services:
  # PostgreSQL Database (must be first)
  - type: psql
    name: aicrm-db
    plan: free
    postgresMajorVersion: "16"

  # Backend API Service
  - type: web
    name: aicrm-api
    env: java
    buildCommand: chmod +x mvnw && ./mvnw -DskipTests clean package -Pproduction
    startCommand: java -jar target/aicrm-0.0.1-SNAPSHOT.jar
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8086
      - key: JAVA_OPTS
        value: -Xmx512m -Xms256m
      - key: JPA_DDL_AUTO
        value: update
      - key: SHOW_SQL
        value: false
      - key: OLLAMA_BASE_URL
        value: https://api.ollama.com
      - key: OLLAMA_MODEL
        value: minimax-m2.5:cloud
      - key: MAIL_USERNAME
        value: your_email@gmail.com
      - key: MAIL_PASSWORD
        value: your_app_password
      - key: JWT_SECRET
        value: generate_a_secure_256_bit_key
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app