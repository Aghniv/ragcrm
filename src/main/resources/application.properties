spring.application.name=aicrm
server.port=${PORT:8086}

# Spring AI
spring.ai.ollama.chat.options.model=${OLLAMA_MODEL:minimax-m2.5:cloud}
spring.ai.vectorstore.pgvector.initialize-schema=${INITIALIZE_SCHEMA:true}

# Database - Use environment variables for production
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/aicrm}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Gmail SMTP - Use environment variables for security
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Lead logging
google.sheets.log.path=${LEAD_LOG_PATH:leads_log.csv}

# JWT Secret - MUST be set in production
jwt.secret=${JWT_SECRET:}

# CORS - Configure for frontend URL (comma-separated)
cors.origins=${CORS_ORIGINS:http://localhost:3000}